          description: the dashboard shows the p50/p95 numbers from the endpoint
          verification: dashboard.spec.ts::dashboard_shows_p50_and_p95_numbers
      complexity: low
      budget_usd: 40.0
      depends_on: [task-1]
      estimate_days: 0.5
      epic_id: epic-1
