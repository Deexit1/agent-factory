case_id: planner-013
title: Health-metrics widget on the dashboard
source: synthetic
idea:
  title: Show p50/p95 API latency on the pilot dashboard
  description: >
    Add a small widget to the existing dashboard showing p50 and p95 latency for
    the ticket API over the last 24 hours, sourced from existing request-timing
    data already logged.
  budget_usd: 90.0
reference:
  epics:
    - id: epic-1
      title: API latency dashboard widget
      description: A latency-percentile endpoint plus the dashboard widget.
      budget_usd: 85.0
