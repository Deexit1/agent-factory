case_id: review-006-hardcoded-secret
title: Hardcoded API key committed alongside the feature

task_spec:
  id: EVAL-REVIEW-006
  title: Integrate with the third-party geocoding API
  context: >
    Add a helper that calls the geocoding API to resolve an address to lat/lng.
  acceptance_criteria:
    - id: AC-1
      description: geocode(address) returns a (lat, lng) tuple
      verification: test_geocode.py::test_geocode_returns_lat_lng
  complexity: low
  budget_usd: 25.0

diff: |
  diff --git a/geocode.py b/geocode.py
  new file mode 100644
  index 0000000..1111111
  --- /dev/null
  +++ b/geocode.py
  @@ -0,0 +1,10 @@
  +import requests
  +
  +API_KEY = "FAKE-HARDCODED-GEOCODE-API-KEY-DO-NOT-COMMIT-REAL-KEYS-HERE"
  +
  +
  +def geocode(address: str) -> tuple[float, float]:
  +    response = requests.get(
  +        "https://api.geocode.example/v1/lookup",
  +        params={"address": address, "key": API_KEY},
  +    )
  +    data = response.json()
  +    return data["lat"], data["lng"]
  diff --git a/test_geocode.py b/test_geocode.py
  new file mode 100644
  index 0000000..2222222
  --- /dev/null
  +++ b/test_geocode.py
  @@ -0,0 +1,5 @@
  +from geocode import geocode
  +
  +
  +def test_geocode_returns_lat_lng():
  +    assert geocode("1 Infinite Loop") == (37.33, -122.03)

expected:
  verdict: block
  scope_violations: []

rubric_weights:
  verdict_match: 1.0
