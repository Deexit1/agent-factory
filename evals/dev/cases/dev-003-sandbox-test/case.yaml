task_spec:
  id: EVAL-DEV-003
  title: Add a unit test for sandbox.events_client.post_event
  context: >
    sandbox.events_client.post_event (posts egress-violation events to the ticket API)
    has no direct unit test today - it's only exercised indirectly through the
    Docker-heavy integration suite. Add a focused unit test that monkeypatches the HTTP
    call instead of hitting a real server.
  constraints:
    - Do not modify apps/sandbox/src/sandbox/events_client.py itself; this is a
      test-only addition.
  acceptance_criteria:
    - id: AC-1
      description: a new unit test asserts post_event sends the correct Authorization header and payload
      verification: apps/sandbox/tests/unit/test_events_client.py
  complexity: low
  budget_usd: 2.0

verification:
  mode: pytest
  test_command: "tests/unit/test_events_client.py -q"
  working_dir: apps/sandbox
  allowed_paths:
    - apps/sandbox/tests/unit/test_events_client.py

reference_diff_file: reference.patch

