# Golden-set floor scores (SPEC-101). Governance: editing this file requires a CODEOWNERS
# approval (see /CODEOWNERS) whenever a floor is LOWERED - raising a floor, or editing
# anything else here, does not need that extra approval. `updated_by`/`rationale` on each
# set exist so a reviewer can see *why* a floor changed without spelunking git blame.
#
# Scores are 0-100, the weighted sum of a set's deterministic checks + haiku-judge rubric
# (see docs/08-evals.md "Scoring"). `not_yet_enforced: true` means the set has no seeded
# cases yet - `make eval` skips it instead of failing on an empty set.

dev:
  floor: 70
  not_yet_enforced: false
  updated_by: T-101
  rationale: >
    Initial floor for the first 4 seeded cases (3 real Phase-1 PRs + 1 synthetic).
    Deliberately not near-perfect: the golden set is small and the dev-agent prompt has
    never been scored before, so 70 catches a real regression without being so tight
    that normal prompt iteration trips it constantly. Revisit once more cases are seeded.

distiller:
  floor: 75
  not_yet_enforced: false
  updated_by: T-101
  rationale: >
    Failure classification (which tests failed, which files are suspect, ignoring
    infra/flaky noise) is a narrower, more deterministic task than open-ended dev work,
    so it can hold a slightly higher bar than the dev set from the start.

planner:
  floor: 70
  not_yet_enforced: false
  updated_by: T-103
  rationale: >
    A real run against live opus first surfaced two bugs, both fixed: (1)
    planner_scorer.invoke_planner crashed on a questions[] response instead of
    scoring it (fixed - now scores it via the judge, deterministic=0, since every
    reference in this set is a full plan and questions[] here means the idea was
    incorrectly treated as under-specified); (2) prompts/planner.md never specified
    the exact JSON shape, so the model returned rich question objects instead of
    plain strings and asked unnecessary questions on well-specified ideas (fixed in
    v0.2 - explicit output-shape section + "prefer a default over a question"
    guidance). After both fixes, a full real run over all 15 cases: 15/15 valid
    plans, zero errors, zero questions, deterministic_score 100 on every case
    (schema/DAG/budget/verification all pass), combined score avg 88.6, min 76.8,
    max 96.8. Floor set to 70, matching the dev set's initial-floor reasoning: a
    buffer below the observed minimum (76.8) so normal judge-scoring variance
    doesn't trip it, while still catching a real regression. Revisit once more
    real usage/cases exist. Run-to-run reproducibility (AC4-style, <2% drift) not
    yet separately verified for this set.

review:
  floor: null
  not_yet_enforced: true
  updated_by: T-101
  rationale: "Review agent doesn't exist until T-106 seeds this set for real."
