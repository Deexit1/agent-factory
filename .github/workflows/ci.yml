name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/web/package-lock.json

      - name: make check
        run: make check

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/web/package-lock.json

      - name: make e2e
        run: make e2e

  a11y:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/web/package-lock.json

      - name: Start postgres + migrated API
        run: |
          cp .env.example .env
          set -a; source .env; set +a
          docker compose up -d postgres
          until docker compose ps postgres | grep -q healthy; do sleep 1; done
          cd apps/api
          python3 -m venv .venv
          .venv/bin/pip install --upgrade pip
          .venv/bin/pip install -e ../../packages/schemas
          .venv/bin/pip install -e ".[dev]"
          export DATABASE_URL="postgresql+psycopg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@localhost:${POSTGRES_PORT}/${POSTGRES_DB}"
          # SPEC-006: the app is auth-gated now, so the a11y audit needs a real session —
          # dev-login stands in for the Google round-trip (see lighthouse-a11y.mjs).
          export AUTH_DEV_MODE=true
          export SESSION_JWT_SECRET="ci-a11y-session-secret-at-least-32-bytes-long"
          .venv/bin/python -m alembic upgrade head
          nohup .venv/bin/python -m uvicorn api.main:app --host 0.0.0.0 --port 8000 &
          until curl -sf http://localhost:8000/health; do sleep 1; done

      - name: Start web dev server
        working-directory: apps/web
        run: |
          npm install
          nohup npm run dev &
          until curl -sf http://localhost:5173/; do sleep 1; done

      - name: make a11y
        run: make a11y

  gitleaks:
    runs-on: ubuntu-latest
    container:
      image: zricethezav/gitleaks:latest
      options: --entrypoint=""
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      # Full-repo scan, not a before/after-SHA diff — gitleaks-action's diff mode
      # breaks on the very first push (root commit has no parent to diff against).
      - run: gitleaks detect --source . --verbose --redact
