name: Eval Gate

# SPEC-101: the golden-set eval harness as a blocking CI check. Unlike agent-pr-gate.yml
# this is NOT restricted to agent/* branches - a human editing a prompt must hit this gate
# too. `eval` runs `make eval --only-changed`, which only live-invokes the set(s) whose
# prompt actually changed vs the PR base (bounding real Anthropic/Langfuse spend on
# unrelated diffs); a manual `make eval` with no flag always scores every set.
# `threshold-governance` only runs when evals/thresholds.yaml changed, and fails CI if any
# floor was LOWERED without an approving review already on the PR from a CODEOWNERS login
# (AC3) - defense in depth alongside /CODEOWNERS + "Require review from Code Owners" in
# branch protection, which only blocks the merge button, not the check itself.

on:
  pull_request:
    paths:
      - "prompts/**"
      - "evals/**"
      - "apps/orchestrator/src/orchestrator/config.py"

jobs:
  eval:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"

      - name: Install claude CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: make eval
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          LANGFUSE_PUBLIC_KEY: ${{ secrets.LANGFUSE_PUBLIC_KEY }}
          LANGFUSE_SECRET_KEY: ${{ secrets.LANGFUSE_SECRET_KEY }}
          LANGFUSE_BASE_URL: ${{ secrets.LANGFUSE_BASE_URL }}
        run: |
          set -eo pipefail
          git fetch origin "${{ github.base_ref }}" --depth=1
          make eval ARGS="--only-changed --base-ref origin/${{ github.base_ref }}"

      - name: Upload eval results
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: eval-results
          path: evals/results/

      - name: Post PR comment with the eval summary
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -eo pipefail
          if [ -f evals/results/summary.md ]; then
            gh pr comment "${{ github.event.pull_request.number }}" \
              --body-file evals/results/summary.md \
              --edit-last 2>/dev/null || \
            gh pr comment "${{ github.event.pull_request.number }}" \
              --body-file evals/results/summary.md
          fi

  threshold-governance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Check whether evals/thresholds.yaml changed
        id: changed
        run: |
          set -eo pipefail
          git fetch origin "${{ github.base_ref }}" --depth=1
          if git diff --name-only "origin/${{ github.base_ref }}" -- evals/thresholds.yaml | grep -q .; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        if: steps.changed.outputs.changed == 'true'
        with:
          python-version: "3.12"

      - name: Fail if a floor was lowered without a CODEOWNERS approval
        if: steps.changed.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          BASE_REF: ${{ github.base_ref }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          set -eo pipefail
          pip install --quiet pyyaml
          python3 apps/orchestrator/scripts/check_threshold_governance.py
